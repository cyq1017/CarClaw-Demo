<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarClaw — 智能车载 AI 助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #14141f;
            --surface-alt: #1a1a2e;
            --border: #2a2a3e;
            --text: #e8e8f0;
            --text-dim: #8888a0;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --green: #00d2a0;
            --orange: #ff9f43;
            --red: #ff6b6b;
            --blue: #54a0ff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── 左侧：车辆面板 ── */
        .vehicle-panel {
            width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .logo span {
            font-size: 11px;
            color: var(--text-dim);
            display: block;
        }

        .status-card {
            background: var(--surface-alt);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .status-card h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .status-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .status-item label {
            font-size: 11px;
            color: var(--text-dim);
        }

        .status-item .value {
            font-size: 20px;
            font-weight: 600;
        }

        .status-item .value.on { color: var(--green); }
        .status-item .value.off { color: var(--text-dim); }

        .drive-mode {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .drive-mode.parked { background: rgba(0, 210, 160, 0.1); color: var(--green); border: 1px solid rgba(0, 210, 160, 0.2); }
        .drive-mode.driving { background: rgba(255, 159, 67, 0.1); color: var(--orange); border: 1px solid rgba(255, 159, 67, 0.2); }
        .drive-mode.highway { background: rgba(255, 107, 107, 0.1); color: var(--red); border: 1px solid rgba(255, 107, 107, 0.2); }

        .mode-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
        .mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-dim);
            transition: background 0.2s;
        }

        .agent-item.active {
            background: var(--accent-glow);
            color: var(--accent);
        }

        .agent-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .agent-item.active .agent-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

        /* ── 右侧：Chat ── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
        }

        .chat-header h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .route-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: var(--accent-glow);
            color: var(--accent);
            display: none;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message .meta {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message.assistant .meta { color: var(--text-dim); }
        .message.user .meta { color: rgba(255,255,255,0.6); }

        .tool-call {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(0, 210, 160, 0.1);
            color: var(--green);
            font-size: 11px;
        }

        .typing {
            align-self: flex-start;
            padding: 12px 16px;
            background: var(--surface-alt);
            border-radius: 16px;
            border: 1px solid var(--border);
            animation: fadeIn 0.3s ease;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .chat-input {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface-alt);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input input:focus { border-color: var(--accent); }

        .chat-input input::placeholder { color: var(--text-dim); }

        .send-btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .send-btn:hover { transform: scale(1.02); box-shadow: 0 4px 15px var(--accent-glow); }
        .send-btn:active { transform: scale(0.98); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .quick-actions {
            padding: 8px 24px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .welcome {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-dim);
        }

        .welcome h2 {
            font-size: 24px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .welcome p { font-size: 14px; margin-bottom: 24px; }

        /* scrollbar */
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>
    <!-- 左侧车辆面板 -->
    <div class="vehicle-panel">
        <div class="logo">
            <div class="logo-icon">🚗</div>
            <div>
                <h1>CarClaw</h1>
                <span>Built on OpenClaw</span>
            </div>
        </div>

        <div class="status-card">
            <h3>🚦 驾驶模式</h3>
            <div id="driveMode" class="drive-mode parked">🅿️ PARKED</div>
            <div class="mode-selector" style="margin-top: 10px;">
                <button class="mode-btn active" onclick="setMode(0)">🅿️ 停车</button>
                <button class="mode-btn" onclick="setMode(40)">🚗 行驶</button>
                <button class="mode-btn" onclick="setMode(120)">🛣️ 高速</button>
            </div>
        </div>

        <div class="status-card">
            <h3>🌡️ 车辆状态</h3>
            <div class="status-grid">
                <div class="status-item">
                    <label>空调</label>
                    <div id="acStatus" class="value off">关闭</div>
                </div>
                <div class="status-item">
                    <label>温度</label>
                    <div id="acTemp" class="value">24°C</div>
                </div>
                <div class="status-item">
                    <label>车速</label>
                    <div id="speed" class="value">0 km/h</div>
                </div>
                <div class="status-item">
                    <label>电量</label>
                    <div id="battery" class="value">80%</div>
                </div>
            </div>
        </div>

        <div class="status-card">
            <h3>🤖 Agent 路由</h3>
            <div id="agentList" class="agent-list">
                <div class="agent-item" data-domain="vehicle"><div class="agent-dot"></div>🚗 车控助手</div>
                <div class="agent-item" data-domain="navigation"><div class="agent-dot"></div>🗺️ 导航助手</div>
                <div class="agent-item" data-domain="media"><div class="agent-dot"></div>🎵 媒体助手</div>
                <div class="agent-item" data-domain="general"><div class="agent-dot"></div>💬 CarClaw</div>
            </div>
        </div>
    </div>

    <!-- 右侧聊天区 -->
    <div class="chat-area">
        <div class="chat-header">
            <h2>💬 对话</h2>
            <div id="routeBadge" class="route-badge"></div>
        </div>

        <div id="messages" class="messages">
            <div class="welcome">
                <h2>👋 你好，我是 CarClaw</h2>
                <p>你的智能车载 AI 助手，试试跟我说话吧</p>
            </div>
        </div>

        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuick('打开空调')">❄️ 打开空调</button>
            <button class="quick-btn" onclick="sendQuick('温度调到25度')">🌡️ 调温度</button>
            <button class="quick-btn" onclick="sendQuick('导航到最近的加油站')">⛽ 找加油站</button>
            <button class="quick-btn" onclick="sendQuick('播放音乐')">🎵 播放音乐</button>
            <button class="quick-btn" onclick="sendQuick('打开驾驶位车门')">🚪 开车门</button>
        </div>

        <div class="chat-input">
            <input id="input" type="text" placeholder="输入消息... 例如：打开空调 22 度" 
                   onkeydown="if(event.key==='Enter')sendMessage()" autofocus>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const API = '';
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            // Remove welcome
            const welcome = messagesEl.querySelector('.welcome');
            if (welcome) welcome.remove();

            inputEl.value = '';
            sendBtn.disabled = true;
            addMessage(text, 'user');
            showTyping();

            try {
                const res = await fetch(`${API}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });
                const data = await res.json();
                removeTyping();

                // Route badge
                const badge = document.getElementById('routeBadge');
                badge.textContent = `🔀 ${data.domain} (${Math.round(data.confidence * 100)}%)`;
                badge.style.display = 'inline-block';

                // Highlight active agent
                document.querySelectorAll('.agent-item').forEach(el => el.classList.remove('active'));
                const activeAgent = document.querySelector(`.agent-item[data-domain="${data.domain}"]`);
                if (activeAgent) activeAgent.classList.add('active');

                // Add reply
                let meta = '';
                if (data.toolCalls && data.toolCalls.length > 0) {
                    meta = data.toolCalls.map(tc =>
                        `<span class="tool-call">🔧 ${tc.name}</span>`
                    ).join(' ');
                }
                addMessage(data.reply, 'assistant', meta);

                // Update vehicle status
                if (data.vehicleStatus) updateVehicleStatus(data.vehicleStatus);
                if (data.driveMode) updateDriveMode(data.driveMode);

            } catch (err) {
                removeTyping();
                addMessage('连接失败，请确保 CarClaw 服务已启动', 'assistant');
            }

            sendBtn.disabled = false;
            inputEl.focus();
        }

        function sendQuick(text) {
            inputEl.value = text;
            sendMessage();
        }

        function addMessage(text, role, meta = '') {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `${text}${meta ? `<div class="meta">${meta}</div>` : ''}`;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function removeTyping() {
            document.getElementById('typingIndicator')?.remove();
        }

        function updateVehicleStatus(status) {
            const acEl = document.getElementById('acStatus');
            const tempEl = document.getElementById('acTemp');
            const speedEl = document.getElementById('speed');
            const batteryEl = document.getElementById('battery');

            if (status.ac) {
                acEl.textContent = status.ac.on ? '运行中' : '关闭';
                acEl.className = `value ${status.ac.on ? 'on' : 'off'}`;
                tempEl.textContent = `${status.ac.temperature}°C`;
            }
            if (status.speed !== undefined) speedEl.textContent = `${status.speed} km/h`;
            if (status.battery !== undefined) batteryEl.textContent = `${status.battery}%`;
        }

        function updateDriveMode(mode) {
            const el = document.getElementById('driveMode');
            const labels = { parked: '🅿️ PARKED', driving: '🚗 DRIVING', highway: '🛣️ HIGHWAY' };
            el.className = `drive-mode ${mode}`;
            el.textContent = labels[mode] || mode;
        }

        async function setMode(speed) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            try {
                const res = await fetch(`${API}/api/mode`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ speed }),
                });
                const data = await res.json();
                updateDriveMode(data.driveMode);
                document.getElementById('speed').textContent = `${data.speed} km/h`;
            } catch (e) {}
        }

        // Initial status load
        fetch(`${API}/api/status`).then(r => r.json()).then(data => {
            if (data.vehicle) updateVehicleStatus(data.vehicle);
            if (data.driveMode) updateDriveMode(data.driveMode);
        }).catch(() => {});
    </script>
</body>
</html>
