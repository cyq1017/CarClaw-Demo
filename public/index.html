<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarClaw — 智能车载 AI 助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --surface-alt: #f0f2f5;
            --border: #e4e7ec;
            --text: #1a1d26;
            --text-dim: #6b7280;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --accent-bg: rgba(108, 92, 231, 0.08);
            --green: #10b981;
            --green-bg: rgba(16, 185, 129, 0.08);
            --orange: #f59e0b;
            --orange-bg: rgba(245, 158, 11, 0.08);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.08);
            --blue: #3b82f6;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── 左侧：车辆面板 ── */
        .vehicle-panel {
            width: 340px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 18px;
            box-shadow: var(--shadow-sm);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.25);
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .logo span {
            font-size: 11px;
            color: var(--text-dim);
            display: block;
            margin-top: 2px;
        }

        .status-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .status-card h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-dim);
            margin-bottom: 14px;
            font-weight: 600;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .status-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--surface-alt);
        }

        .status-item label {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 500;
        }

        .status-item .value {
            font-size: 22px;
            font-weight: 700;
        }

        .status-item .value.on {
            color: var(--green);
        }

        .status-item .value.off {
            color: var(--text-dim);
        }

        .drive-mode {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
        }

        .drive-mode.parked {
            background: var(--green-bg);
            color: var(--green);
            border: 1.5px solid rgba(16, 185, 129, 0.2);
        }

        .drive-mode.driving {
            background: var(--orange-bg);
            color: var(--orange);
            border: 1.5px solid rgba(245, 158, 11, 0.2);
        }

        .drive-mode.highway {
            background: var(--red-bg);
            color: var(--red);
            border: 1.5px solid rgba(239, 68, 68, 0.2);
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .mode-btn {
            padding: 7px 14px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-bg);
        }

        .mode-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(108, 92, 231, 0.25);
        }

        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
            color: var(--text-dim);
            transition: all 0.2s;
            font-weight: 500;
        }

        .agent-item.active {
            background: var(--accent-bg);
            color: var(--accent);
        }

        .agent-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.2s;
        }

        .agent-item.active .agent-dot {
            background: var(--accent);
            box-shadow: 0 0 8px rgba(108, 92, 231, 0.4);
        }

        /* ── 右侧：Chat ── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .chat-header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
        }

        .chat-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .route-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: var(--accent-bg);
            color: var(--accent);
            display: none;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.65;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 14px rgba(108, 92, 231, 0.2);
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
            box-shadow: var(--shadow-sm);
        }

        .message .meta {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message.user .meta {
            color: rgba(255, 255, 255, 0.7);
        }

        .tool-call {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 8px;
            background: var(--green-bg);
            color: var(--green);
            font-size: 11px;
            font-weight: 600;
        }

        .typing {
            align-self: flex-start;
            padding: 14px 18px;
            background: var(--surface);
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.3s ease;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-light);
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .chat-input {
            padding: 18px 28px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: var(--surface-alt);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }

        .chat-input input::placeholder {
            color: #b0b7c3;
        }

        .send-btn {
            padding: 14px 24px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.2);
        }

        .send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(108, 92, 231, 0.3);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .quick-actions {
            padding: 10px 28px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 8px 16px;
            border-radius: 22px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-bg);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .welcome {
            text-align: center;
            padding: 80px 40px;
            color: var(--text-dim);
        }

        .welcome-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.2);
        }

        .welcome h2 {
            font-size: 26px;
            color: var(--text);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .welcome p {
            font-size: 15px;
            color: var(--text-dim);
        }

        /* mic button */
        .mic-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .mic-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-bg);
        }

        .mic-btn.recording {
            background: var(--red);
            border-color: var(--red);
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .mic-status {
            font-size: 11px;
            color: var(--red);
            font-weight: 600;
            padding: 0 28px;
            height: 0;
            overflow: hidden;
            transition: height 0.2s;
        }

        .mic-status.active {
            height: 20px;
        }

        /* scrollbar */
        .messages::-webkit-scrollbar {
            width: 5px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }
    </style>
</head>

<body>
    <!-- 左侧车辆面板 -->
    <div class="vehicle-panel">
        <div class="logo">
            <div class="logo-icon">🚗</div>
            <div>
                <h1>CarClaw</h1>
                <span>Built on OpenClaw · v0.2</span>
            </div>
        </div>

        <div class="status-card">
            <h3>🚦 驾驶模式</h3>
            <div id="driveMode" class="drive-mode parked">🅿️ PARKED</div>
            <div class="mode-selector">
                <button class="mode-btn active" onclick="setMode(0)">🅿️ 停车</button>
                <button class="mode-btn" onclick="setMode(40)">🚗 行驶</button>
                <button class="mode-btn" onclick="setMode(120)">🛣️ 高速</button>
            </div>
        </div>

        <div class="status-card">
            <h3>🌡️ 车辆状态</h3>
            <div class="status-grid">
                <div class="status-item">
                    <label>空调</label>
                    <div id="acStatus" class="value off">关闭</div>
                </div>
                <div class="status-item">
                    <label>温度</label>
                    <div id="acTemp" class="value">24°C</div>
                </div>
                <div class="status-item">
                    <label>车速</label>
                    <div id="speed" class="value">0 km/h</div>
                </div>
                <div class="status-item">
                    <label>电量</label>
                    <div id="battery" class="value">85%</div>
                </div>
            </div>
        </div>

        <div class="status-card">
            <h3>🤖 Agent 路由</h3>
            <div id="agentList" class="agent-list">
                <div class="agent-item" data-domain="vehicle">
                    <div class="agent-dot"></div>🚗 车控助手
                </div>
                <div class="agent-item" data-domain="navigation">
                    <div class="agent-dot"></div>🗺️ 导航助手
                </div>
                <div class="agent-item" data-domain="media">
                    <div class="agent-dot"></div>🎵 媒体助手
                </div>
                <div class="agent-item" data-domain="general">
                    <div class="agent-dot"></div>💬 CarClaw
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧聊天区 -->
    <div class="chat-area">
        <div class="chat-header">
            <h2>💬 对话</h2>
            <div id="routeBadge" class="route-badge"></div>
        </div>

        <div id="messages" class="messages">
            <div class="welcome">
                <div class="welcome-icon">🚗</div>
                <h2>你好，我是 CarClaw</h2>
                <p>你的智能车载 AI 助手，试试跟我说话吧</p>
            </div>
        </div>

        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuick('打开空调')">❄️ 打开空调</button>
            <button class="quick-btn" onclick="sendQuick('温度调到25度')">🌡️ 调温度</button>
            <button class="quick-btn" onclick="sendQuick('导航到最近的加油站')">⛽ 找加油站</button>
            <button class="quick-btn" onclick="sendQuick('播放音乐')">🎵 播放音乐</button>
            <button class="quick-btn" onclick="sendQuick('打开驾驶位车门')">🚪 开车门</button>
        </div>

        <div id="micStatus" class="mic-status">🎙️ 正在聆听...</div>
        <div class="chat-input">
            <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="语音输入">🎙️</button>
            <input id="input" type="text" placeholder="输入消息或点击 🎙️ 语音输入"
                onkeydown="if(event.key==='Enter')sendMessage()" autofocus>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const API = '';
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;
            const welcome = messagesEl.querySelector('.welcome');
            if (welcome) welcome.remove();
            inputEl.value = '';
            sendBtn.disabled = true;
            addMessage(text, 'user');
            showTyping();
            try {
                const res = await fetch(`${API}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });
                const data = await res.json();
                removeTyping();
                const badge = document.getElementById('routeBadge');
                badge.textContent = `🔀 ${data.domain} (${Math.round(data.confidence * 100)}%)`;
                badge.style.display = 'inline-block';
                document.querySelectorAll('.agent-item').forEach(el => el.classList.remove('active'));
                const activeAgent = document.querySelector(`.agent-item[data-domain="${data.domain}"]`);
                if (activeAgent) activeAgent.classList.add('active');
                let meta = '';
                if (data.toolCalls && data.toolCalls.length > 0) {
                    meta = data.toolCalls.map(tc => `<span class="tool-call">🔧 ${tc.name}</span>`).join(' ');
                }
                addMessage(data.reply, 'assistant', meta);
                if (data.vehicleStatus) updateVehicleStatus(data.vehicleStatus);
                if (data.driveMode) updateDriveMode(data.driveMode);
            } catch (err) {
                removeTyping();
                addMessage('连接失败，请确保 CarClaw 服务已启动', 'assistant');
            }
            sendBtn.disabled = false;
            inputEl.focus();
        }

        function sendQuick(text) { inputEl.value = text; sendMessage(); }

        function addMessage(text, role, meta = '') {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `${text}${meta ? `<div class="meta">${meta}</div>` : ''}`;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing'; div.id = 'typingIndicator';
            div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function removeTyping() { document.getElementById('typingIndicator')?.remove(); }

        function updateVehicleStatus(status) {
            const acEl = document.getElementById('acStatus');
            const tempEl = document.getElementById('acTemp');
            const speedEl = document.getElementById('speed');
            const batteryEl = document.getElementById('battery');
            if (status.ac) {
                acEl.textContent = status.ac.on ? '运行中' : '关闭';
                acEl.className = `value ${status.ac.on ? 'on' : 'off'}`;
                tempEl.textContent = `${status.ac.temperature}°C`;
            }
            if (status.speed !== undefined) speedEl.textContent = `${status.speed} km/h`;
            if (status.battery !== undefined) batteryEl.textContent = `${status.battery}%`;
        }

        function updateDriveMode(mode) {
            const el = document.getElementById('driveMode');
            const labels = { parked: '🅿️ PARKED', driving: '🚗 DRIVING', highway: '🛣️ HIGHWAY' };
            el.className = `drive-mode ${mode}`;
            el.textContent = labels[mode] || mode;
        }

        async function setMode(speed) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            try {
                const res = await fetch(`${API}/api/mode`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ speed }),
                });
                const data = await res.json();
                updateDriveMode(data.driveMode);
                document.getElementById('speed').textContent = `${data.speed} km/h`;
            } catch (e) { }
        }

        // ── Web Speech API 语音输入 ──
        let recognition = null;
        let isRecording = false;

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return null;
            const r = new SpeechRecognition();
            r.lang = 'zh-CN';
            r.interimResults = true;
            r.continuous = false;

            r.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                inputEl.value = transcript;
                if (event.results[event.results.length - 1].isFinal) {
                    stopRecording();
                    sendMessage();
                }
            };

            r.onerror = (event) => {
                console.warn('Speech error:', event.error);
                stopRecording();
            };

            r.onend = () => { stopRecording(); };
            return r;
        }

        function toggleVoice() {
            if (isRecording) {
                recognition?.stop();
                stopRecording();
            } else {
                if (!recognition) recognition = initSpeechRecognition();
                if (!recognition) {
                    addMessage('浏览器不支持语音输入，请使用 Chrome', 'assistant');
                    return;
                }
                isRecording = true;
                document.getElementById('micBtn').classList.add('recording');
                document.getElementById('micStatus').classList.add('active');
                inputEl.placeholder = '🎙️ 说话中...';
                recognition.start();
            }
        }

        function stopRecording() {
            isRecording = false;
            document.getElementById('micBtn').classList.remove('recording');
            document.getElementById('micStatus').classList.remove('active');
            inputEl.placeholder = '输入消息或点击 🎙️ 语音输入';
        }

        fetch(`${API}/api/status`).then(r => r.json()).then(data => {
            if (data.vehicle) updateVehicleStatus(data.vehicle);
            if (data.driveMode) updateDriveMode(data.driveMode);
        }).catch(() => { });
    </script>
</body>

</html>
